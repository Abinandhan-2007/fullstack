spring.application.name=intuition-portal

# 1. Database Connection (Replace your old localhost lines with these)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Fix for the "undefined/unknown" error
spring.jpa.properties.hibernate.connection.url=${SPRING_DATASOURCE_URL}

# 3. Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. Optional: If you copied React files to the static folder
spring.web.resources.static-locations=classpath:/static/